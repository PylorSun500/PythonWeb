<body>
    <h2>{{ datetime }} 年 {{ message }}</h2>
    <table border="1" style="border-collapse: collapse">
        <tr>
            <td>序号</td>
            <td>书名</td>
            <td>出版时间</td>
            <td>价格</td>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ book.bookname }}</td>
            <td>{{ book.time }}</td>
            <td>{{ book.price }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
